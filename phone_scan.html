<!-- AUTHENTICA scan phone (standalone, install-ready) -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Mono:wght@400;500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#060606;--card:#141414;--green:#52C478;--green2:#5CB887;--coral:#FF8C7A;--ink:#F8F8F6;--muted:rgba(255,255,255,.55)}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:transparent}
  body{background:transparent;
    display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;
    font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased}
  #fit{transform-origin:center center}
  .phone{position:relative;width:332px;height:712px;border-radius:54px;background:#0a0a0a;
    border:1px solid rgba(255,255,255,.07);
    box-shadow:0 2px 0 0 rgba(255,255,255,.06) inset, 0 60px 120px -30px rgba(0,0,0,.85), 0 0 90px -20px rgba(0,0,0,.6)}
  .phone .screen{position:absolute;inset:11px;border-radius:44px;overflow:hidden;background:var(--bg)}
  .phone .island{position:absolute;top:16px;left:50%;transform:translateX(-50%);width:88px;height:24px;border-radius:999px;background:#000;z-index:40}
  .phone .gloss{position:absolute;inset:0;pointer-events:none;z-index:50;
    background:linear-gradient(125deg, rgba(255,255,255,.05) 0%, transparent 22%, transparent 78%, rgba(255,255,255,.025) 100%)}

  .scan{position:absolute;inset:0;padding:46px 18px 18px}
  .scan .t{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:24px;color:var(--ink);margin-bottom:5px}
  .scan .s{font-size:12px;color:var(--muted);margin-bottom:14px}
  .vf{position:relative;border-radius:18px;overflow:hidden;border:1px solid rgba(255,140,122,.2);height:478px}
  .vf img{width:100%;height:100%;object-fit:cover;display:block}
  .vig{position:absolute;inset:0;background:radial-gradient(ellipse 66% 56% at 50% 48%, transparent 34%, rgba(0,0,0,.45) 100%)}
  .fr{position:absolute;top:9%;left:7%;right:7%;bottom:9%;border-radius:12px}
  .fr span{position:absolute;width:22px;height:22px}
  .fr .tl{top:-1px;left:-1px;border-top:3px solid var(--coral);border-left:3px solid var(--coral);border-radius:5px 0 0 0}
  .fr .tr{top:-1px;right:-1px;border-top:3px solid var(--coral);border-right:3px solid var(--coral);border-radius:0 5px 0 0}
  .fr .bl{bottom:-1px;left:-1px;border-bottom:3px solid var(--coral);border-left:3px solid var(--coral);border-radius:0 0 0 5px}
  .fr .br{bottom:-1px;right:-1px;border-bottom:3px solid var(--coral);border-right:3px solid var(--coral);border-radius:0 0 5px 0}
  .sb{position:absolute;bottom:0;left:0;right:0;padding:11px 14px;background:rgba(0,0,0,.72);display:flex;align-items:center;justify-content:center;gap:8px}
  .sb .d{width:7px;height:7px;border-radius:50%;background:var(--green)}
  .sb .x{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;color:rgba(255,255,255,.62)}
  .snbtn{margin-top:16px;width:100%;padding:17px;border-radius:14px;text-align:center;
    background:linear-gradient(135deg,var(--coral),#E8604A);color:#000;font-weight:700;
    font-family:'DM Mono',monospace;font-size:13px;letter-spacing:.14em;box-shadow:0 8px 28px rgba(255,140,122,.32)}
</style>
