<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Authentica — Get Early Access</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #111111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      font-family: 'DM Sans', sans-serif;
    }
    .logo { font-size: 64px; margin-bottom: 24px; }
    .headline {
      font-family: 'Cormorant Garamond', serif;
      font-size: 48px;
      font-weight: 700;
      color: #ffffff;
      text-align: center;
      margin-bottom: 16px;
      line-height: 1.1;
    }
    .subheadline {
      font-size: 16px;
      color: #999999;
      text-align: center;
      max-width: 500px;
      line-height: 1.6;
      margin-bottom: 40px;
    }
    form { width: 100%; max-width: 400px; }
    input {
      width: 100%;
      padding: 14px 16px;
      margin-bottom: 12px;
      background: #000000;
      border: 1px solid #333333;
      border-radius: 10px;
      color: #ffffff;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #FF8C7A; }
    button {
      width: 100%;
      padding: 15px;
      background: #FF8C7A;
      border: none;
      border-radius: 10px;
      color: #000000;
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:disabled { opacity: 0.7; cursor: default; }
    .fine-print {
      margin-top: 12px;
      font-size: 11px;
      color: #666666;
      text-align: center;
    }
    .message {
      font-size: 16px;
      color: #ffffff;
      text-align: center;
    }
    .error {
      margin-top: 10px;
      font-size: 13px;
      color: #ff6b6b;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="logo">🛡️</div>
  <div class="headline">Get Early Access</div>
  <div class="subheadline">
    Authentica is the AI that catches fake sneakers, luxury bags, and watches in under a second. Join the list before we go public.
  </div>

  <div id="form-container">
    <form id="waitlist-form">
      <input type="email" id="email" placeholder="Your email address" required>
      <button type="submit" id="submit-btn">Reserve My Spot</button>
      <div class="fine-print">No spam. No credit card. Just early access.</div>
    </form>
  </div>

  <script>
    const form = document.getElementById('waitlist-form');
    const emailInput = document.getElementById('email');
    const submitBtn = document.getElementById('submit-btn');
    const container = document.getElementById('form-container');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = emailInput.value.trim();
      if (!email) return;

      submitBtn.disabled = true;
      submitBtn.textContent = 'Reserving…';

      const params = new URLSearchParams(window.location.search);
      const source = params.get('source') || 'landing_page';

      try {
        const res = await fetch('https://authenticabackend-production.up.railway.app/api/waitlist', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, source }),
        });
        const data = await res.json().catch(() => ({}));

        if (data.success === false) {
          container.innerHTML = '<div class="message">You are already on the list.</div>';
        } else if (data.success === true) {
          container.innerHTML = '<div class="message">You are on the list. We will reach out before launch.</div>';
        } else {
          throw new Error('Unexpected response');
        }
      } catch (err) {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Reserve My Spot';
        const errorDiv = document.createElement('div');
        errorDiv.className = 'error';
        errorDiv.textContent = 'Something went wrong. Please try again.';
        form.appendChild(errorDiv);
        setTimeout(() => errorDiv.remove(), 3000);
      }
    });
  </script>
</body>
</html>
